<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共享视野雷达</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        html,body{min-height:100%;width:100%}
        body{font-family:"Microsoft YaHei",Arial,system-ui,sans-serif;background:#080b0f;color:#edf2f7;overflow-x:hidden}
        .scene{position:fixed;inset:0;z-index:0;background:#080b0f}
        .scene::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(8,11,15,.9),rgba(8,11,15,.68)),linear-gradient(180deg,rgba(8,11,15,.12),#080b0f),url("map.png") center/cover no-repeat;filter:saturate(.85) contrast(1.08)}
        .scene::after{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:48px 48px;opacity:.38;mask-image:linear-gradient(90deg,transparent,black 20%,black 80%,transparent);-webkit-mask-image:linear-gradient(90deg,transparent,black 20%,black 80%,transparent)}
        .radar-bg{position:absolute;right:8vw;bottom:8vh;width:360px;height:360px;border:1px solid rgba(81,207,102,.26);border-radius:50%;opacity:.42;pointer-events:none}
        .radar-bg .ring{position:absolute;inset:18%;border:1px solid rgba(81,207,102,.34);border-radius:50%}
        .radar-bg .ring:nth-child(2){inset:34%;border-color:rgba(255,212,89,.24)}
        .radar-bg .ring:nth-child(3){inset:48%;border-color:rgba(255,255,255,.18)}
        .radar-bg .sweep{position:absolute;top:50%;left:50%;width:48%;height:2px;background:linear-gradient(90deg,rgba(81,207,102,.9),transparent);transform-origin:left center;animation:radarSweep 5s linear infinite}
        .radar-bg .dot{position:absolute;top:34%;left:64%;width:7px;height:7px;background:#ffd459;border-radius:50%;box-shadow:0 0 18px rgba(255,212,89,.9)}
        @keyframes radarSweep{to{transform:rotate(360deg)}}
        .layout{position:relative;z-index:1;min-height:100vh;min-height:100svh;display:flex;align-items:center;justify-content:center;width:100%;margin:0 auto;padding:40px 16px}
        .card{width:100%;max-width:430px;background:rgba(12,17,23,.94);border:1px solid rgba(255,255,255,.12);border-radius:8px;box-shadow:0 22px 70px rgba(0,0,0,.46);overflow:hidden}
        .card-header{padding:30px 30px 0}
        .radar-icon{position:relative;width:48px;height:48px;margin-bottom:18px;border:1px solid rgba(81,207,102,.45);border-radius:50%;background:rgba(81,207,102,.06)}
        .radar-icon .r-ring{position:absolute;inset:8px;border:1px solid rgba(81,207,102,.28);border-radius:50%}
        .radar-icon .r-ring:nth-child(2){inset:17px;border-color:rgba(255,212,89,.28)}
        .radar-icon .r-ring:nth-child(3){display:none}
        .radar-icon .r-sweep{position:absolute;top:50%;left:50%;width:48%;height:1px;background:#51cf66;transform-origin:left center;animation:radarSweep 3.6s linear infinite}
        .radar-icon .r-dot{position:absolute;top:50%;left:50%;width:5px;height:5px;margin:-2.5px;background:#ffd459;border-radius:50%;box-shadow:0 0 10px rgba(255,212,89,.9)}
        .brand-name{font-size:24px;font-weight:700;letter-spacing:0;color:#fff}
        .brand-sub{font-size:12px;color:#94a3b8;margin-top:6px;letter-spacing:.08em;text-transform:uppercase}
        .tabs{display:flex;margin:24px 30px 0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:3px;position:relative}
        .tab-btn{flex:1;min-width:0;padding:10px 0;text-align:center;font-size:13px;font-weight:600;color:#9aa6b2;background:none;border:none;border-radius:6px;cursor:pointer;transition:color .2s;position:relative;z-index:1;text-decoration:none;display:block}
        .tab-btn:hover{color:#edf2f7}
        .tab-btn.active{color:#07100b}
        .tab-slider{position:absolute;top:3px;left:3px;width:calc(33.333% - 2px);height:calc(100% - 6px);background:linear-gradient(135deg,#51cf66,#ffd459);border-radius:6px;transition:transform .25s ease;z-index:0}
        .tabs[data-pos="1"] .tab-slider{transform:translateX(100%)}
        .tabs[data-pos="2"] .tab-slider{transform:translateX(200%)}
        .card-body{padding:24px 30px 30px;color:#edf2f7}
        .form-view{display:none}
        .form-view.active{display:block;animation:fadeUp .25s ease}
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .form-title{font-size:18px;font-weight:700;margin-bottom:6px;color:#fff}
        .form-desc{font-size:12px;color:#9aa6b2;margin-bottom:20px;line-height:1.7}
        .field{margin-bottom:14px}
        .field label{display:block;font-size:12px;font-weight:600;color:#b8c1cc;margin-bottom:7px;padding-left:1px;letter-spacing:0}
        .input-wrap{position:relative;display:flex;align-items:center}
        .input-wrap .ico{position:absolute;left:13px;display:flex;color:#7c8a99;transition:color .2s;pointer-events:none}
        .input-wrap input{width:100%;height:46px;padding:12px 13px 12px 42px;background:#111821;border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s,background .2s}
        .input-wrap input::placeholder{color:#667382}
        .input-wrap input:focus{border-color:#51cf66;background:#0f171f;box-shadow:0 0 0 3px rgba(81,207,102,.16)}
        .input-wrap:focus-within .ico{color:#51cf66}
        .btn-main{width:100%;height:46px;padding:0 14px;margin-top:6px;border:none;border-radius:8px;font-size:14px;font-weight:700;letter-spacing:.08em;color:#07100b;cursor:pointer;background:linear-gradient(135deg,#51cf66,#ffd459);box-shadow:0 12px 28px rgba(81,207,102,.18);transition:transform .2s,filter .2s,box-shadow .2s}
        .btn-main:hover:not(:disabled){transform:translateY(-1px);filter:brightness(1.04);box-shadow:0 16px 34px rgba(81,207,102,.24)}
        .btn-main:active:not(:disabled){transform:translateY(0)}
        .btn-main:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
        .row-between{display:flex;align-items:center;justify-content:space-between;margin-top:14px;font-size:12px;gap:14px}
        .check-label{display:inline-flex;align-items:center;gap:7px;color:#a9b4c0;cursor:pointer;user-select:none}
        .check-label input{accent-color:#51cf66;width:14px;height:14px}
        .link-text{color:#a9b4c0;text-decoration:none;font-size:12px;background:none;border:none;cursor:pointer;padding:0;transition:color .2s}
        .link-text:hover{color:#ffd459}
        .divider{display:flex;align-items:center;gap:12px;margin-top:20px;font-size:11px;color:#667382}
        .divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.08)}
        .row-links{display:flex;justify-content:center;gap:20px;margin-top:14px;font-size:12px;font-weight:600}
        .row-links a{color:#c5ced8;text-decoration:none;transition:color .2s}
        .row-links a:hover{color:#ffd459}
        .links-small{margin-top:14px;text-align:center;font-size:14px;color:#667382;line-height:2.2}
        .links-small a{color:#a9b4c0;text-decoration:none;transition:color .2s}
        .links-small a:hover{color:#51cf66}
        .link-back{display:block;text-align:center;margin-top:16px;font-size:12px;color:#9fcf9f;text-decoration:none;transition:color .2s}
        .link-back:hover{color:#ffd459}
        .msg{margin-top:10px;font-size:12px;min-height:16px;text-align:center}
        .msg.err{color:#ff7b7b}
        .msg.ok{color:#51cf66}
        .card-hint{font-size:11px;margin-top:5px;min-height:14px;padding-left:2px}
        .card-hint.ok{color:#51cf66}
        .card-hint.err{color:#ff7b7b}
        .scroll-form{max-height:min(55vh,480px);overflow-y:auto;padding-right:4px;margin-right:-4px}
        .scroll-form::-webkit-scrollbar{width:4px}
        .scroll-form::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16);border-radius:999px}
        .card-foot{padding:15px 30px;border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center;font-size:10px;color:#667382}
        .card-foot a{color:#8d99a8;text-decoration:none;margin-right:12px;transition:color .2s}
        .card-foot a:hover{color:#ffd459}
        @media(max-width:980px){.layout{padding:26px 16px}.card{margin:0 auto}}

        @media(max-width:360px){.card-header{padding-left:16px;padding-right:16px}.tabs{margin-left:16px;margin-right:16px}.card-body{padding-left:16px;padding-right:16px}.tab-btn{font-size:12px}.row-links{gap:14px}.card-foot{font-size:9px}}
        @media(max-height:680px) and (min-width:981px){.card-header{padding-top:22px}.card-body{padding-top:18px;padding-bottom:22px}.radar-icon{width:42px;height:42px;margin-bottom:12px}.tabs{margin-top:18px}.field{margin-bottom:12px}}
    </style>
</head>

    <script>
        var CONFIG = {

        function normalizeLinkUrl(url) {
            var raw = String(url || '').trim();
            if (!raw) return '';
            if (/^[a-z][a-z0-9+.-]*:/i.test(raw)) return raw;
            if (raw.charAt(0) === '/' || raw.charAt(0) === '#' || raw.indexOf('./') === 0 || raw.indexOf('../') === 0) return raw;
            var hostPart = raw.split(/[\/?#]/, 1)[0];
            if (/^\d{1,3}(\.\d{1,3}){3}(:\d+)?$/.test(hostPart) || /^localhost(:\d+)?$/i.test(hostPart)) return 'https://' + raw;
            if (hostPart.indexOf('.') !== -1) {
                var suffix = hostPart.split('.').pop().toLowerCase().replace(/:\d+$/, '');
                var fileExtensions = ['html', 'htm', 'php', 'asp', 'aspx', 'jsp', 'json', 'xml', 'txt', 'apk', 'zip', 'rar', '7z', 'js', 'css', 'png', 'jpg', 'jpeg', 'gif', 'webp', 'svg', 'ico'];
                if (fileExtensions.indexOf(suffix) === -1) return 'https://' + raw;
            }
            return raw;
        }

        var MSG = {
            NETWORK_ERROR: '网络错误，请稍后重试',
            NON_JSON_RESPONSE: '接口返回非JSON数据，请联系管理员',
            LOGIN_SUCCESS: '登录成功，跳转中...',
            LOGIN_FAIL: '登录失败',
            REGISTER_SUCCESS: '注册成功，跳转中...',
            REGISTER_FAIL: '注册失败',
            ACTIVATE_FAIL: '激活失败',
            RESET_SUCCESS: '重置成功，请返回登录',
            RESET_FAIL: '重置失败'
        };

        function apiFetch(module, options) {
            options = options || {};
            var url = CONFIG.API_BASE + '?module=' + encodeURIComponent(module);
            var method = options.method || 'POST';
            var body = options.body || null;
            var qs = options.qs || null;

            if (qs && typeof qs === 'object') {
                var search = new URLSearchParams();
                Object.keys(qs).forEach(function (k) {
                    if (qs[k] !== undefined && qs[k] !== null) {
                        search.append(k, qs[k]);
                    }
                });
                url += '&' + search.toString();
            }

            var fetchOptions = {
                method: method,
                credentials: 'include',
                headers: options.headers || {}
            };

            if (body && method !== 'GET') {
                fetchOptions.headers['Content-Type'] = 'application/json';
                fetchOptions.body = JSON.stringify(body);
            }

            return fetch(url, fetchOptions).then(function (r) {
                return r.text().then(function (t) {
                    if (!t) {
                        throw new Error(MSG.NON_JSON_RESPONSE + '：(empty)');
                    }
                    try {
                        return JSON.parse(t);
                    } catch (e) {
                        throw new Error(MSG.NON_JSON_RESPONSE + '：' + t.slice(0, 200));
                    }
                });
            });
        }

        function applyAppLinkSettings() {
            var trial = document.getElementById('btnClaimTrial');
            var trialUrl = normalizeLinkUrl(CONFIG.TRIAL_URL);
            if (trial && trialUrl) {
                trial.href = trialUrl;
                trial.target = '_blank';
                trial.rel = 'noopener';
            }
            var down = document.getElementById('linkDownloadApp');
            var downloadUrl = normalizeLinkUrl(CONFIG.APP_DOWNLOAD_URL);
            if (down && downloadUrl) {
                down.href = downloadUrl;
                down.target = '_blank';
                down.rel = 'noopener';
            }
            var buy = document.getElementById('linkBuyCard');
            var buyUrl = normalizeLinkUrl(CONFIG.BUY_CARD_URL);
            if (buy && buyUrl) {
                buy.href = buyUrl;
                buy.target = '_blank';
                buy.rel = 'noopener';
            }
        }

        fetch('api/index.php?module=app_settings&action=public', { credentials: 'omit', cache: 'no-store' })
            .then(function(r) { return r.json(); })
            .then(function(res) {
                var d = res && res.code === 0 ? (res.data || {}) : {};
                if (d.trial_url !== undefined) CONFIG.TRIAL_URL = normalizeLinkUrl(d.trial_url || '');
                if (d.buy_card_url !== undefined) CONFIG.BUY_CARD_URL = normalizeLinkUrl(d.buy_card_url || '');
                if (d.download_url !== undefined) CONFIG.APP_DOWNLOAD_URL = normalizeLinkUrl(d.download_url || '');
                applyAppLinkSettings();
            })
            .catch(function() { applyAppLinkSettings(); });

        function setMsg(el, type, text) {
            if (!el) return;
            el.className = 'msg' + (type ? ' ' + type : '');
            el.textContent = text || '';
        }

        function setBtnLoading(btn, loading, loadingText, normalText) {
            if (!btn) return;
            if (loading) {
                btn.disabled = true;
                if (loadingText) btn.textContent = loadingText;
            } else {
                btn.disabled = false;
                if (normalText) btn.textContent = normalText;
            }
        }

        function switchView(name) {
            var views = document.querySelectorAll('.form-view');
            views.forEach(function(v){ v.classList.remove('active'); });
            var target = document.getElementById('view-' + name);
            if (target) {
                target.classList.add('active');
            }
            var tabBar = document.getElementById('tabBar');
            var posMap = { login: '0', register: '1', activate: '2', forget: '0' };
            if (tabBar) tabBar.setAttribute('data-pos', posMap[name] || '0');
            document.querySelectorAll('.nav-link[data-view]').forEach(function(a) {
                var v = a.getAttribute('data-view');
                a.classList.toggle('active', v === name || (name === 'forget' && v === 'login'));
            });
        }

        (function rememberUsername() {
            var key = 'login_remember_username_v1';
            var inp = document.getElementById('login-user');
            var cb = document.getElementById('keepLoggedIn');
            if (!inp || !cb) return;
            try {
                var saved = localStorage.getItem(key);
                if (saved) { inp.value = saved; cb.checked = true; }
            } catch (e) {}
            document.getElementById('loginForm').addEventListener('submit', function() {
                try {
                    if (cb.checked) localStorage.setItem(key, inp.value.trim());
                    else localStorage.removeItem(key);
                } catch (e) {}
            });
        })();

        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            var msg = document.getElementById('loginMsg');
            setMsg(msg, '', '');
            var btnLogin = document.getElementById('btnLogin');
            setBtnLoading(btnLogin, true, '登录中...', '开始使用');
            var fd = new FormData(this);
            apiFetch('user_login', {
                body: {
                    username: fd.get('username'),
                    password: fd.get('password')
                }
            }).then(function(res) {
                if (res.code === 0) {
                    setMsg(msg, 'ok', MSG.LOGIN_SUCCESS);
                    setTimeout(function() { location.href = 'index.php'; }, 80);
                } else {
                    setMsg(msg, 'err', res.msg || MSG.LOGIN_FAIL);
                    setBtnLoading(btnLogin, false, null, '开始使用');
                }
            }).catch(function(err) {
                try { console.error('login fetch error:', err); } catch (e) {}
                setMsg(msg, 'err', MSG.NETWORK_ERROR + (err && err.message ? '：' + err.message : ''));
                setBtnLoading(btnLogin, false, null, '开始使用');
            });
        };

        (function initForgetPassword() {
            var a = document.getElementById('buyCardLink');
            if (!a) return;
            a.onclick = function(e) {
                e.preventDefault();
                switchView('forget');
                setTimeout(function() {
                    var el = document.querySelector('#view-forget input[name="username"]');
                    if (el) el.focus();
                }, 0);
            };
        })();

        document.querySelectorAll('.nav-link[data-view]').forEach(function(el) {
            el.addEventListener('click', function(e) {
                e.preventDefault();
                var v = el.getAttribute('data-view');
                if (v) switchView(v);
            });
        });

        document.getElementById('linkToRegister').addEventListener('click', function(e){
            e.preventDefault();
            switchView('register');
        });
        document.getElementById('linkToActivate').addEventListener('click', function(e){
            e.preventDefault();
            switchView('activate');
        });

        (function initHelpNav() {
            var a = document.getElementById('navHelp');
            if (!a) return;
            a.addEventListener('click', function(e) {
                e.preventDefault();
                try { document.querySelector('.card-foot').scrollIntoView({ behavior: 'smooth' }); } catch (err) {}
            });
        })();

        (function initDownloadApp() {
            var a = document.getElementById('linkDownloadApp');
            if (!a) return;
            var downloadUrl = normalizeLinkUrl(CONFIG.APP_DOWNLOAD_URL);
            if (!downloadUrl) {
                a.textContent = '下载客户端';
                a.href = '#';
                a.onclick = function(e){ e.preventDefault(); };
            } else {
                a.textContent = '下载客户端';
                a.href = downloadUrl;
                a.target = '_blank';
                a.rel = 'noopener';
            }
        })();

        (function initBuyCardLink() {
            var a = document.getElementById('linkBuyCard');
            if (!a) return;
            var buyUrl = normalizeLinkUrl(CONFIG.BUY_CARD_URL);
            if (!buyUrl) {
                a.textContent = '购买卡密';
                a.href = '#';
                a.onclick = function(e){ e.preventDefault(); };
            } else {
                a.textContent = '购买卡密';
                a.href = buyUrl;
                a.target = '_blank';
                a.rel = 'noopener';
            }
        })();

        (function() {
            var cardInput = document.getElementById('registerCardCodeInput');
            var cardHint = document.getElementById('registerCardHint');
            var checkTimer = null;

            if (cardInput) {
                cardInput.addEventListener('input', function() {
                    var code = this.value.trim();
                    cardHint.textContent = '';
                    cardHint.className = 'card-hint';
                    cardInput.classList.remove('valid', 'invalid');
                    if (checkTimer) clearTimeout(checkTimer);
                    if (code.length < 4) return;
                    checkTimer = setTimeout(function() {
                        apiFetch('card', {
                            method: 'GET',
                            qs: { action: 'check', card_code: code }
                        }).then(function(res) {
                                if (res.data && res.data.valid === true) {
                                    cardHint.textContent = '卡密有效';
                                    cardHint.className = 'card-hint ok';
                                    cardInput.classList.add('valid');
                                } else {
                                    cardHint.textContent = res.msg || '卡密无效';
                                    cardHint.className = 'card-hint err';
                                    cardInput.classList.add('invalid');
                                }
                            }).catch(function() {
                                cardHint.textContent = '校验请求失败';
                                cardHint.className = 'card-hint err';
                            });
                    }, 400);
                });
            }

            var registerForm = document.getElementById('registerForm');
            if (registerForm) {
                registerForm.onsubmit = function(e) {
                    e.preventDefault();
                    var msg = document.getElementById('registerMsg');
                    var btn = document.getElementById('registerBtnSubmit');
                    setMsg(msg, '', '');
                    var username = registerForm.querySelector('input[name="username"]').value.trim();
                    var password = registerForm.querySelector('input[name="password"]').value;
                    var password_confirm = registerForm.querySelector('input[name="password_confirm"]').value;
                    var card_code = registerForm.querySelector('input[name="card_code"]').value.trim();
                    var security_code = registerForm.querySelector('input[name="security_code"]').value;

                    if (username.length < 4) {
                        setMsg(msg, 'err', '用户名至少4位');
                        return;
                    }
                    if (password.length < 4) {
                        setMsg(msg, 'err', '密码至少4位');
                        return;
                    }
                    if (password !== password_confirm) {
                        setMsg(msg, 'err', '两次密码不一致');
                        return;
                    }
                    if (!card_code) {
                        setMsg(msg, 'err', '请输入卡密');
                        return;
                    }
                    if (!security_code || security_code.length < 4) {
                        setMsg(msg, 'err', '安全码至少4位，请重新输入');
                        return;
                    }

                    setBtnLoading(btn, true, '注册中...', '注 册');
                    apiFetch('register', {
                        body: { username: username, password: password, card_code: card_code, security_code: security_code }
                    }).then(function(res) {
                        if (res.code === 0) {
                            setMsg(msg, 'ok', MSG.REGISTER_SUCCESS);
                            setTimeout(function() { location.href = 'index.php'; }, 800);
                        } else {
                            setMsg(msg, 'err', res.msg || MSG.REGISTER_FAIL);
                            setBtnLoading(btn, false, null, '注 册');
                        }
                    }).catch(function(err) {
                        setMsg(msg, 'err', MSG.NETWORK_ERROR + (err && err.message ? '：' + err.message : ''));
                        setBtnLoading(btn, false, null, '注 册');
                    });
                };
            }

            document.getElementById('registerToLogin').addEventListener('click', function(e){
                e.preventDefault();
                switchView('login');
            });
            document.getElementById('registerToActivate').addEventListener('click', function(e){
                e.preventDefault();
                switchView('activate');
            });
        })();

        (function() {
            var btn = document.getElementById('btnClaimTrial');
            var msg = document.getElementById('trialMsg');
            if (!btn || !msg) return;
            function getTrialDeviceId() {
                var key = 'trial_device_id_v1';
                try {
                    var existing = localStorage.getItem(key);
                    if (existing && existing.length >= 8) return existing;
                    var id = 'd-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);
                    localStorage.setItem(key, id);
                    return id;
                } catch (e) {
                    return 'fallback-' + Math.random().toString(36).slice(2, 10);
                }
            }
            function getTrialDeviceName() {
                try {
                    var ua = navigator.userAgent || '';
                    var platform = navigator.platform || '';
                    var name = (platform ? platform + ' - ' : '') + ua;
                    if (name.length > 250) {
                        name = name.slice(0, 250);
                    }
                    return name;
                } catch (e) {
                    return '';
                }
            }
            var deviceId = getTrialDeviceId();
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                var trialUrl = normalizeLinkUrl(CONFIG.TRIAL_URL);
                if (trialUrl) {
                    window.open(trialUrl, '_blank', 'noopener');
                    return;
                }
                setMsg(msg, '', '');
                btn.style.pointerEvents = 'none';
                var oldText = btn.textContent;
                btn.textContent = '领取中...';
                var deviceName = getTrialDeviceName();
                fetch('api/index.php?module=trial_card&action=claim', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ device_id: deviceId, device_name: deviceName })
                }).then(function(r) {
                    return r.json();
                }).then(function(res) {
                    if (res.code === 0 && res.data && res.data.card_code) {
                        msg.className = 'msg ok';
                        msg.textContent = (res.msg ? res.msg + ' ' : '') + '卡密：' + res.data.card_code + '（请复制用于注册或激活）';
                        try {
                            var cardInput = document.getElementById('registerCardCodeInput');
                            if (cardInput) {
                                switchView('register');
                                cardInput.value = res.data.card_code;
                                cardInput.dispatchEvent(new Event('input'));
                            }
                        } catch (e) {}
                    } else {
                        msg.className = 'msg err';
                        msg.textContent = res.msg || '领取失败';
                    }
                }).catch(function() {
                    msg.className = 'msg err';
                    msg.textContent = '网络错误';
                }).finally(function() {
                    btn.style.pointerEvents = '';
                    btn.textContent = oldText;
                });
            });
        })();

        (function() {
            var usernameInput = document.getElementById('activateUsernameInput');
            var cardInput = document.getElementById('activateCardCodeInput');
            var cardHint = document.getElementById('activateCardHint');
            var msg = document.getElementById('activateMsg');
            var successBox = document.getElementById('activateSuccessBox');
            var checkTimer = null;

            if (!usernameInput || !cardInput) return;

            cardInput.addEventListener('input', function() {
                successBox.style.display = 'none';
                msg.textContent = '';
                var code = this.value.trim();
                cardHint.textContent = '';
                cardHint.className = 'card-hint';
                cardInput.classList.remove('valid', 'invalid');
                if (checkTimer) clearTimeout(checkTimer);
                if (code.length < 4) return;
                    checkTimer = setTimeout(function() {
                        apiFetch('card', {
                            method: 'GET',
                            qs: { action: 'check', card_code: code }
                        }).then(function(res) {
                            if (res.data && res.data.valid === true) {
                                cardHint.textContent = '卡密有效';
                                cardHint.className = 'card-hint ok';
                                cardInput.classList.add('valid');
                            } else {
                                cardHint.textContent = res.msg || '卡密无效';
                                cardHint.className = 'card-hint err';
                                cardInput.classList.add('invalid');
                            }
                        }).catch(function() {
                            cardHint.textContent = '校验请求失败';
                            cardHint.className = 'card-hint err';
                        });
                }, 400);
            });

            var activateForm = document.getElementById('activateForm');
            if (activateForm) {
                activateForm.onsubmit = function(e) {
                    e.preventDefault();
                    msg.className = 'msg';
                    msg.textContent = '';
                    var username = usernameInput.value.trim();
                    var code = cardInput.value.trim();
                    if (!username) {
                        setMsg(msg, 'err', '请输入用户名');
                        return;
                    }
                    if (!code) {
                        setMsg(msg, 'err', '请输入卡密');
                        return;
                    }
                    var btn = document.getElementById('activateBtnSubmit');
                    setBtnLoading(btn, true, '激活中...', '激 活');
                    apiFetch('activate_card', {
                        body: { username: username, card_code: code }
                    })
                        .then(function(res) {
                            setBtnLoading(btn, false, null, '激 活');
                            if (res.code === 0) {
                                successBox.style.display = 'block';
                                msg.textContent = '';
                            } else {
                                setMsg(msg, 'err', res.msg || MSG.ACTIVATE_FAIL);
                            }
                        })
                        .catch(function(err) {
                            setBtnLoading(btn, false, null, '激 活');
                            setMsg(msg, 'err', MSG.NETWORK_ERROR + (err && err.message ? '：' + err.message : ''));
                        });
                };
            }

            document.getElementById('activateToLogin').addEventListener('click', function(e){
                e.preventDefault();
                switchView('login');
            });
            document.getElementById('activateToRegister').addEventListener('click', function(e){
                e.preventDefault();
                switchView('register');
            });
        })();

        (function() {
            var resetForm = document.getElementById('resetPasswordForm');
            if (!resetForm) return;
            var msg = document.getElementById('resetMsg');
            var usernameInput = resetForm.querySelector('input[name="username"]');
            var securityInput = resetForm.querySelector('input[name="security_code"]');
            var newPassInput = resetForm.querySelector('input[name="new_password"]');
            var newPassConfirmInput = resetForm.querySelector('input[name="new_password_confirm"]');
            var btn = document.getElementById('resetBtnSubmit');

            resetForm.onsubmit = function(e) {
                e.preventDefault();
                setMsg(msg, '', '');

                var username = usernameInput ? usernameInput.value.trim() : '';
                var security_code = securityInput ? securityInput.value : '';
                var new_password = newPassInput ? newPassInput.value : '';
                var new_password_confirm = newPassConfirmInput ? newPassConfirmInput.value : '';

                if (!username) {
                    setMsg(msg, 'err', '请输入用户名');
                    return;
                }
                if (!security_code || security_code.length < 4) {
                    setMsg(msg, 'err', '安全码至少4位，请重新输入');
                    return;
                }
                if (!new_password || new_password.length < 4) {
                    setMsg(msg, 'err', '新密码至少4位');
                    return;
                }
                if (new_password !== new_password_confirm) {
                    setMsg(msg, 'err', '两次新密码不一致');
                    return;
                }

                setBtnLoading(btn, true, '重置中...', '重 置');
                apiFetch('user_reset_password', {
                    body: {
                        username: username,
                        security_code: security_code,
                        new_password: new_password
                    }
                })
                    .then(function(res) {
                        setBtnLoading(btn, false, null, '重 置');
                        if (res.code === 0) {
                            setMsg(msg, 'ok', res.msg || MSG.RESET_SUCCESS);
                            setTimeout(function() { switchView('login'); }, 900);
                        } else {
                            setMsg(msg, 'err', res.msg || MSG.RESET_FAIL);
                        }
                    })
                    .catch(function(err) {
                        setBtnLoading(btn, false, null, '重 置');
                        setMsg(msg, 'err', MSG.NETWORK_ERROR + (err && err.message ? '：' + err.message : ''));
                    });
            };

            var toLogin = document.getElementById('resetToLogin');
            if (toLogin) {
                toLogin.addEventListener('click', function(e) {
                    e.preventDefault();
                    switchView('login');
                });
            }
        })();
    </script>
</body>
</html>
