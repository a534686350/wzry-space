# ============================================================
# WebSocket 白名单代理配置
# 保存到 /etc/nginx/conf.d/ws_whitelist.conf
#
# 工作原理：
#   1. 客户端连接 :8888 或 :9999（原来的端口，无需改客户端代码）
#   2. nginx 先调 auth_request 查白名单（PHP 接口）
#   3. 通过 → 转发到 JAR 的内部端口 18888 / 19999
#   4. 不通过 → 直接关闭连接（403）
#
# 前提操作：
#   a. 修改 JAR 启动端口为 18888/19999（见 start-server.sh）
#   b. 防火墙封掉外部直连 18888/19999：
#        iptables -I INPUT -p tcp --dport 18888 ! -s 127.0.0.1 -j DROP
#        iptables -I INPUT -p tcp --dport 19999 ! -s 127.0.0.1 -j DROP
#      或宝塔面板 → 安全 → 端口规则，只允许 127.0.0.1 访问 18888/19999
# ============================================================

# -------- 白名单检查的内部 location（供 auth_request 使用）--------
# 注意：auth_request 必须在同一个 server 块里定义
# 这里用一个公共 upstream server 块来放 PHP 后端
upstream php_backend {
    server 127.0.0.1:80;   # 改为你实际的 PHP/nginx 80 端口（通常就是本机80）
}

# -------- 8888 端口：WebSocket 白名单代理 --------
server {
    listen 8888;

    # auth_request：每次 WebSocket 握手前先调用 PHP 白名单接口
    # PHP 返回 200 → 允许；非200 → 拒绝
    location /ws {
        auth_request /ws_auth;
        error_page 403 = @ws_deny;

        proxy_pass          http://127.0.0.1:18888;   # JAR 实际监听的内部端口
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # 内部白名单查询（不对外暴露）
    location = /ws_auth {
        internal;
        proxy_pass          http://127.0.0.1:80/api/index.php?module=check_ws_access;
        proxy_pass_request_body off;
        proxy_set_header    Content-Length "";
        proxy_set_header    X-Original-URI $request_uri;
        proxy_set_header    X-Real-IP      $remote_addr;
        proxy_set_header    X-Forwarded-For $remote_addr;
        # 把客户端的 Cookie 传过去（网页登录用 session）
        proxy_set_header    Cookie         $http_cookie;
    }

    location @ws_deny {
        # WebSocket 客户端会收到 HTTP 403，连接拒绝
        return 403 '{"code":403,"msg":"请先登录后再使用雷达"}';
        add_header Content-Type application/json;
    }

    # 其他路径直接转发（如 JAR 提供的其他接口）
    location / {
        auth_request /ws_auth;
        error_page 403 = @ws_deny;
        proxy_pass http://127.0.0.1:18888;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# -------- 9999 端口：同样逻辑 --------
server {
    listen 9999;

    location /ws {
        auth_request /ws_auth;
        error_page 403 = @ws_deny;

        proxy_pass          http://127.0.0.1:19999;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    location = /ws_auth {
        internal;
        proxy_pass          http://127.0.0.1:80/api/index.php?module=check_ws_access;
        proxy_pass_request_body off;
        proxy_set_header    Content-Length "";
        proxy_set_header    X-Real-IP      $remote_addr;
        proxy_set_header    X-Forwarded-For $remote_addr;
        proxy_set_header    Cookie         $http_cookie;
    }

    location @ws_deny {
        return 403 '{"code":403,"msg":"请先登录后再使用雷达"}';
        add_header Content-Type application/json;
    }

    location / {
        auth_request /ws_auth;
        error_page 403 = @ws_deny;
        proxy_pass http://127.0.0.1:19999;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
