# 项目在站点根目录时的 Nginx 配置示例
# 请根据实际路径和 PHP 版本修改 root 和 fastcgi_pass

server {
    listen 80;
    server_name 101.200.36.103;   # 或你的域名

    # 项目所在目录（根目录下已有 auth、api、admin、index.html）
    root /www/wwwroot/wzry;   # 改成你服务器上的实际路径
    index index.html index.php;

    # 先匹配 .php，交给 PHP 执行（必须写在 location / 前面，否则会被当静态文件下载）
    location ~ \.php$ {
        fastcgi_pass unix:/tmp/php-cgi-74.sock;   # 宝塔 PHP 7.4 常用；或 127.0.0.1:9000
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;           # 传递真实客户端 IP，供黑名单等使用
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        include fastcgi_params;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
