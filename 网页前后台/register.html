<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 游戏雷达</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #1a1f3a 0%, #0a0e27 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #e0e0e0; padding: 20px; }
        .box { background: rgba(47,54,60,0.95); border: 1px solid rgba(74,158,255,0.3); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
        h1 { font-size: 22px; margin-bottom: 24px; color: #4a9eff; text-align: center; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #aaa; }
        label .hint { color: #666; font-size: 12px; font-weight: normal; }
        input { width: 100%; padding: 12px 14px; border: 1px solid rgba(74,158,255,0.3); border-radius: 10px; background: rgba(26,31,36,0.8); color: #fff; font-size: 14px; }
        input:focus { outline: none; border-color: #4a9eff; }
        input.valid { border-color: rgba(81,207,102,0.6); }
        input.invalid { border-color: rgba(255,107,107,0.6); }
        .card-hint { font-size: 12px; margin-top: 4px; min-height: 18px; }
        .card-hint.ok { color: #51cf66; }
        .card-hint.err { color: #ff6b6b; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(135deg, #4a9eff 0%, #258DF2 100%); color: #fff; font-size: 15px; cursor: pointer; margin-top: 6px; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 1px solid rgba(74,158,255,0.5); margin-top: 12px; display: block; text-align: center; line-height: 2.8; text-decoration: none; color: #4a9eff; }
        .btn-outline:hover { background: rgba(74,158,255,0.15); color: #6bb6ff; }
        .msg { margin-top: 12px; font-size: 13px; text-align: center; min-height: 20px; }
        .msg.err { color: #ff6b6b; }
        .msg.ok { color: #51cf66; }
        .link { margin-top: 20px; text-align: center; font-size: 14px; color: #888; }
        .link a { color: #4a9eff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h1>注册</h1>
        <p style="text-align:center;color:#888;margin-bottom:20px;font-size:13px;">用户名至少4位，需填写有效卡密，并设置一个安全码用于找回密码</p>
        <form id="registerForm">
            <div class="form-group">
                <label>用户名 <span class="hint">（至少4位）</span></label>
                <input type="text" name="username" required minlength="4" placeholder="请输入用户名（至少4位）" autocomplete="username">
            </div>
            <div class="form-group">
                <label>卡密</label>
                <input type="text" name="card_code" required placeholder="请输入卡密" autocomplete="off" id="cardCodeInput">
                <div id="cardHint" class="card-hint"></div>
            </div>
            <div class="form-group">
                <label>安全码 <span class="hint">（用于重置密码，请牢记，至少4位）</span></label>
                <input type="password" name="security_code" required minlength="4" placeholder="请设置安全码" autocomplete="off">
            </div>
            <div class="form-group">
                <label>密码 <span class="hint">（至少4位）</span></label>
                <input type="password" name="password" required minlength="4" placeholder="请设置密码" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" name="password_confirm" required placeholder="再次输入密码" autocomplete="new-password">
            </div>
            <button type="submit" class="btn" id="btnSubmit">注册</button>
            <a href="login.html" class="btn btn-outline">已有账号？去登录</a>
        </form>
        <div id="msg" class="msg"></div>
        <div class="link"><a href="activate.html">先去激活卡密</a></div>
    </div>
    <script>
        (function() {
            var cardInput = document.getElementById('cardCodeInput');
            var cardHint = document.getElementById('cardHint');
            var checkTimer = null;

            // 从卡密激活页跳转过来时带 ?card_code=xxx，预填并校验
            var m = /card_code=([^&]+)/.exec(window.location.search || '');
            if (m && m[1]) {
                cardInput.value = decodeURIComponent(m[1]);
                cardInput.dispatchEvent(new Event('input', { bubbles: true }));
            }

            // 卡密输入后自动与后台对接校验
            cardInput.addEventListener('input', function() {
                var code = this.value.trim();
                cardHint.textContent = '';
                cardHint.className = 'card-hint';
                cardInput.classList.remove('valid', 'invalid');
                if (checkTimer) clearTimeout(checkTimer);
                if (code.length < 4) return;
                checkTimer = setTimeout(function() {
                    fetch('api/index.php?module=card&action=check&card_code=' + encodeURIComponent(code), { credentials: 'include' })
                        .then(function(r) { return r.json(); })
                        .then(function(res) {
                            if (res.data && res.data.valid === true) {
                                cardHint.textContent = '卡密有效';
                                cardHint.className = 'card-hint ok';
                                cardInput.classList.add('valid');
                            } else {
                                cardHint.textContent = res.msg || '卡密无效';
                                cardHint.className = 'card-hint err';
                                cardInput.classList.add('invalid');
                            }
                        }).catch(function() {
                            cardHint.textContent = '校验请求失败';
                            cardHint.className = 'card-hint err';
                        });
                }, 400);
            });

            document.getElementById('registerForm').onsubmit = function(e) {
                e.preventDefault();
                var msg = document.getElementById('msg');
                var btn = document.getElementById('btnSubmit');
                msg.className = 'msg';
                msg.textContent = '';
                var username = document.querySelector('input[name="username"]').value.trim();
                var password = document.querySelector('input[name="password"]').value;
                var password_confirm = document.querySelector('input[name="password_confirm"]').value;
                var card_code = document.querySelector('input[name="card_code"]').value.trim();
                var security_code = document.querySelector('input[name="security_code"]').value;

                if (username.length < 4) {
                    msg.className = 'msg err';
                    msg.textContent = '用户名至少4位';
                    return;
                }
                if (password.length < 4) {
                    msg.className = 'msg err';
                    msg.textContent = '密码至少4位';
                    return;
                }
                if (password !== password_confirm) {
                    msg.className = 'msg err';
                    msg.textContent = '两次密码不一致';
                    return;
                }
                if (!card_code) {
                    msg.className = 'msg err';
                    msg.textContent = '请输入卡密';
                    return;
                }
                if (!security_code || security_code.length < 4) {
                    msg.className = 'msg err';
                    msg.textContent = '安全码至少4位，请重新输入';
                    return;
                }

                btn.disabled = true;
                fetch('api/index.php?module=register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username: username, password: password, card_code: card_code, security_code: security_code })
                }).then(function(r) { return r.json(); }).then(function(res) {
                    if (res.code === 0) {
                        msg.className = 'msg ok';
                        msg.textContent = '注册成功，跳转中...';
                        setTimeout(function() { location.href = 'index.php'; }, 800);
                    } else {
                        msg.className = 'msg err';
                        msg.textContent = res.msg || '注册失败';
                        btn.disabled = false;
                    }
                }).catch(function() {
                    msg.className = 'msg err';
                    msg.textContent = '网络错误';
                    btn.disabled = false;
                });
            };
        })();
    </script>
</body>
</html>
