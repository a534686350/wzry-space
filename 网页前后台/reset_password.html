<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - 游戏雷达</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #1a1f3a 0%, #0a0e27 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #e0e0e0; padding: 20px; }
        .box { background: rgba(47,54,60,0.95); border: 1px solid rgba(74,158,255,0.3); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
        h1 { font-size: 22px; margin-bottom: 16px; color: #4a9eff; text-align: center; }
        .tip { font-size: 13px; color: #9ca3af; text-align:center; margin-bottom: 20px; line-height: 1.6; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #aaa; }
        label .hint { color: #666; font-size: 12px; font-weight: normal; }
        input { width: 100%; padding: 12px 14px; border: 1px solid rgba(74,158,255,0.3); border-radius: 10px; background: rgba(26,31,36,0.8); color: #fff; font-size: 14px; }
        input:focus { outline: none; border-color: #4a9eff; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(135deg, #4a9eff 0%, #258DF2 100%); color: #fff; font-size: 15px; cursor: pointer; margin-top: 6px; }
        .btn:hover { opacity: 0.9; }
        .btn-outline { background: transparent; border: 1px solid rgba(74,158,255,0.5); margin-top: 12px; display: block; text-align: center; line-height: 2.8; text-decoration: none; color: #4a9eff; }
        .btn-outline:hover { background: rgba(74,158,255,0.15); color: #6bb6ff; }
        .msg { margin-top: 12px; font-size: 13px; text-align: center; min-height: 20px; }
        .msg.err { color: #ff6b6b; }
        .msg.ok { color: #51cf66; }
    </style>
</head>
<body>
    <div class="box">
        <h1>重置密码</h1>
        <p class="tip">请填写您注册时设置的用户名和安全码，然后设置一个新密码。</p>
        <form id="resetForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required minlength="4" placeholder="请输入用户名" autocomplete="username">
            </div>
            <div class="form-group">
                <label>安全码 <span class="hint">（注册时设置的安全码）</span></label>
                <input type="password" name="security_code" required minlength="4" placeholder="请输入安全码" autocomplete="off">
            </div>
            <div class="form-group">
                <label>新密码 <span class="hint">（至少4位）</span></label>
                <input type="password" name="new_password" required minlength="4" placeholder="请设置新密码" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" name="new_password_confirm" required placeholder="再次输入新密码" autocomplete="new-password">
            </div>
            <button type="submit" class="btn" id="btnSubmit">确认重置</button>
            <a href="login.html" class="btn-outline">返回登录</a>
        </form>
        <div id="msg" class="msg"></div>
    </div>
    <script>
        document.getElementById('resetForm').onsubmit = function(e) {
            e.preventDefault();
            var msg = document.getElementById('msg');
            var btn = document.getElementById('btnSubmit');
            msg.className = 'msg';
            msg.textContent = '';
            var username = document.querySelector('input[name="username"]').value.trim();
            var security_code = document.querySelector('input[name="security_code"]').value;
            var new_password = document.querySelector('input[name="new_password"]').value;
            var new_password_confirm = document.querySelector('input[name="new_password_confirm"]').value;

            if (username.length < 4) {
                msg.className = 'msg err';
                msg.textContent = '用户名至少4位';
                return;
            }
            if (!security_code || security_code.length < 4) {
                msg.className = 'msg err';
                msg.textContent = '安全码至少4位';
                return;
            }
            if (new_password.length < 4) {
                msg.className = 'msg err';
                msg.textContent = '新密码至少4位';
                return;
            }
            if (new_password !== new_password_confirm) {
                msg.className = 'msg err';
                msg.textContent = '两次输入的新密码不一致';
                return;
            }

            btn.disabled = true;
            btn.textContent = '提交中...';
            fetch('api/index.php?module=user_reset_password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({
                    username: username,
                    security_code: security_code,
                    new_password: new_password
                })
            }).then(function(r) { return r.json(); }).then(function(res) {
                if (res.code === 0) {
                    msg.className = 'msg ok';
                    msg.textContent = '密码已重置，请使用新密码登录';
                    setTimeout(function() { location.href = 'login.html'; }, 1000);
                } else {
                    msg.className = 'msg err';
                    msg.textContent = res.msg || '重置失败';
                    btn.disabled = false;
                    btn.textContent = '确认重置';
                }
            }).catch(function() {
                msg.className = 'msg err';
                msg.textContent = '网络错误';
                btn.disabled = false;
                btn.textContent = '确认重置';
            });
        };
    </script>
</body>
</html>
